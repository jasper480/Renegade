document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

y:'IBM Plex Mono',monospace;font-size:15px;letter-spacing:.2em;color:#3a5b4c;text-transform:uppercase;\">Building globe…<\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  constructor(props){\n    super(props);\n    this.holder = React.createRef();\n    this.tip = React.createRef();\n    this.load = React.createRef();\n    this._raf = null;\n  }\n  renderVals(){\n    return { holderRef: this.holder, tipRef: this.tip, loadRef: this.load };\n  }\n  componentDidMount(){ this._wait(); }\n  componentWillUnmount(){\n    if(this._raf) cancelAnimationFrame(this._raf);\n    window.removeEventListener('resize', this._onResize);\n  }\n  _wait(){\n    if(window.THREE && window.topojson && window.SHIP_DATA){ this._init(); }\n    else setTimeout(()=>this._wait(), 60);\n  }\n\n  // lat/lng (deg) -> Vector3 on sphere radius r\n  _v3(lat,lng,r){\n    const T=window.THREE;\n    const phi=(90-lat)*Math.PI/180, the=(lng+180)*Math.PI/180;\n    return new T.Vector3(\n      -(r*Math.sin(phi)*Math.cos(the)),\n       (r*Math.cos(phi)),\n       (r*Math.sin(phi)*Math.sin(the))\n    );\n  }\n  _discTex(inner, outer){\n    const c=document.createElement('canvas'); c.width=c.height=64;\n    const x=c.getContext('2d'); const g=x.createRadialGradient(32,32,0,32,32,32);\n    g.addColorStop(0,inner); g.addColorStop(.45,inner); g.addColorStop(1,outer);\n    x.fillStyle=g; x.beginPath(); x.arc(32,32,32,0,7); x.fill();\n    const t=new window.THREE.Texture(c); t.needsUpdate=true; return t;\n  }\n\n  async _init(){\n    const T=window.THREE, holder=this.holder.current;\n    const D=window.SHIP_DATA;\n    let W=holder.clientWidth||1280, H=holder.clientHeight||720;\n    const renderer=new T.WebGLRenderer({antialias:true,alpha:true});\n    renderer.setPixelRatio(Math.min(window.devicePixelRatio||1,2));\n    renderer.setSize(W,H); holder.appendChild(renderer.domElement);\n    const scene=new T.Scene();\n    const camera=new T.PerspectiveCamera(36,W/H,0.1,100);\n    let camDist=2.95; camera.position.set(0,0,camDist);\n    const root=new T.Group(); scene.add(root);\n    const R=1;\n\n    // ---- base sphere (occludes far side) ----\n    const base=new T.Mesh(new T.SphereGeometry(R*0.992,64,64),\n      new T.MeshBasicMaterial({color:0x081410}));\n    root.add(base);\n    // faint inner gradient sphere for depth\n    const base2=new T.Mesh(new T.SphereGeometry(R*0.985,48,48),\n      new T.MeshPhongMaterial({color:0x0c2018,emissive:0x05110b,shininess:6,specular:0x113322}));\n    root.add(base2);\n    const dl=new T.DirectionalLight(0x88ffcc,0.6); dl.position.set(-1,0.4,1.2); scene.add(dl);\n    scene.add(new T.AmbientLight(0x224433,0.5));\n\n    // ---- atmosphere glow ----\n    const atmMat=new T.ShaderMaterial({\n      transparent:true, blending:T.AdditiveBlending, side:T.BackSide, depthWrite:false,\n      uniforms:{c:{value:new T.Color(0x2fd27a)}},\n      vertexShader:'varying vec3 vN;void main(){vN=normalize(normalMatrix*normal);gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}',\n      fragmentShader:'varying vec3 vN;uniform vec3 c;void main(){float i=pow(0.62-dot(vN,vec3(0.,0.,1.)),3.2);gl_FragColor=vec4(c,1.)*clamp(i,0.,1.)*1.1;}'\n    });\n    scene.add(new T.Mesh(new T.SphereGeometry(R*1.0,48,48), atmMat));\n\n    // ---- land dots from world atlas ----\n    let landTest=null;\n    try{\n      const atlasUrl=(window.__resources&&window.__resources.worldAtlas)||'https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json';\n      const topo=await fetch(atlasUrl).then(r=>r.json());\n      const geo=window.topojson.feature(topo, topo.objects.countries);\n      const TW=2048, TH=1024;\n      const cv=document.createElement('canvas'); cv.width=TW; cv.height=TH;\n      const cx=cv.getContext('2d'); cx.fillStyle='#ffffff';\n      const toXY=(lng,lat)=>[ (lng+180)/360*TW, (90-lat)/180*TH ];\n      const drawPolys=(polys)=>{ // polys: array of polygons; each = array of rings; ring = [[lng,lat]..]\n        cx.beginPath();\n        for(const poly of polys){\n          for(const ring of poly){\n            for(let i=0;i<ring.length;i++){ const xy=toXY(ring[i][0],ring[i][1]); if(i===0)cx.moveTo(xy[0],xy[1]); else cx.lineTo(xy[0],xy[1]); }\n            cx.closePath();\n          }\n        }\n        cx.fill('evenodd');\n      };\n      for(const f of geo.features){\n        const g=f.geometry; if(!g) continue;\n        if(g.type==='Polygon') drawPolys([g.coordinates]);\n        else if(g.type==='MultiPolygon') drawPolys(g.coordinates);\n      }\n      const id=cx.getImageData(0,0,TW,TH).data;\n      landTest=(lat,lng)=>{\n        let u=Math.floor((lng+180)/360*TW), v=Math.floor((90-lat)/180*TH);\n        if(u<0)u=0; if(u>=TW)u=TW-1; if(v<0)v=0; if(v>=TH)v=TH-1;\n        return id[(v*TW+u)*4+3]>120;\n      };\n    }catch(e){ console.warn('land mask failed',e); landTest=()=>true; }\n\n    const dotPos=[];\n    for(let lat=-80; lat<=83; lat+=1.45){\n      const circ=Math.max(Math.cos(lat*Math.PI/180),0.06);\n      const step=1.45/circ;\n      for(let lng=-180; lng<180; lng+=step){\n        if(landTest(lat,lng)){ const p=this._v3(lat,lng,R); dotPos.push(p.x,p.y,p.z); }\n      }\n    }\n    const dg=new T.BufferGeometry();\n    dg.setAttribute('position', new T.Float32BufferAttribute(dotPos,3));\n    const dots=new T.Points(dg, new T.PointsMaterial({\n      color:0x3a9f66, size:0.015, map:this._discTex('rgba(120,230,170,1)','rgba(120,230,170,0)'),\n      transparent:true, alphaTest:0.25, sizeAttenuation:true, depthWrite:false\n    }));\n    root.add(dots);\n\n    // ---- destination markers (3 size buckets by volume) ----\n    const buckets={a:[],b:[],c:[]}; // 1 / 2-3 / 4+\n    for(const p of D.points){\n      const v=this._v3(p[1],p[2],R*1.004);\n      const cnt=p[3];\n      (cnt>=4?buckets.c:cnt>=2?buckets.b:buckets.a).push(v.x,v.y,v.z);\n    }\n    const mkPts=(arr,size,col)=>{\n      const g=new T.BufferGeometry(); g.setAttribute('position',new T.Float32BufferAttribute(arr,3));\n      const pts=new T.Points(g,new T.PointsMaterial({color:col,size,map:this._discTex('rgba(180,255,210,1)','rgba(70,224,138,0)'),transparent:true,alphaTest:0.05,sizeAttenuation:true,depthWrite:false,blending:T.AdditiveBlending}));\n      root.add(pts); return pts;\n    };\n    mkPts(buckets.a,0.020,0x46e08a);\n    mkPts(buckets.b,0.030,0x6cf2a4);\n    mkPts(buckets.c,0.044,0xaef7cd);\n\n    // ---- arcs from origin ----\n    const O=this._v3(D.origin.la,D.origin.lo,R);\n    const arcGroup=new T.Group(); root.add(arcGroup);\n    const pulsePos=[]; const pulseCurves=[]; const pulseSpeed=[]; const pulseOff=[];\n    const arcLines=[];\n    const Odir=O.clone().normalize();\n    const slerp=(a,b,t)=>{\n      let d=Math.max(-1,Math.min(1,a.dot(b)));\n      const th=Math.acos(d)*t;\n      let rel=b.clone().sub(a.clone().multiplyScalar(d));\n      if(rel.lengthSq()<1e-9) return a.clone();\n      rel.normalize();\n      return a.clone().multiplyScalar(Math.cos(th)).add(rel.multiplyScalar(Math.sin(th)));\n    };\n    D.points.forEach((p,i)=>{\n      const Ddir=this._v3(p[1],p[2],R).normalize();\n      const ang=Math.acos(Math.max(-1,Math.min(1,Odir.dot(Ddir)))); // 0..PI\n      const height=0.10 + ang*0.20;\n      const segs=54, raw=[];\n      for(let k=0;k<=segs;k++){\n        const f=k/segs;\n        const bump=Math.sin(Math.PI*f)*height;\n        raw.push(slerp(Odir,Ddir,f).multiplyScalar(R*(1+bump)));\n      }\n      const curve=new T.CatmullRomCurve3(raw);\n      const pts=raw;\n      const g=new T.BufferGeometry().setFromPoints(pts);\n      const cols=[]; const cA=new T.Color(0x1c7a4a), cB=new T.Color(p[6]?0x9be8ff:0x7cf2ad);\n      const NV=pts.length;\n      for(let k=0;k<NV;k++){ const c=cA.clone().lerp(cB,k/(NV-1)); cols.push(c.r,c.g,c.b); }\n      g.setAttribute('color',new T.Float32BufferAttribute(cols,3));\n      const mat=new T.LineBasicMaterial({vertexColors:true,transparent:true,opacity:0,blending:T.AdditiveBlending,depthWrite:false});\n      const line=new T.Line(g,mat); line._delay=i*7; arcGroup.add(line); arcLines.push(line);\n      pulseCurves.push(curve); pulseSpeed.push(0.5+Math.random()*0.5); pulseOff.push(Math.random());\n      pulsePos.push(0,0,0);\n    });\n    // traveling pulses\n    const pg=new T.BufferGeometry(); pg.setAttribute('position',new T.Float32BufferAttribute(pulsePos,3));\n    const pulses=new T.Points(pg,new T.PointsMaterial({color:0xcafff0,size:0.028,map:this._discTex('rgba(220,255,240,1)','rgba(150,255,210,0)'),transparent:true,sizeAttenuation:true,depthWrite:false,blending:T.AdditiveBlending}));\n    root.add(pulses);\n\n    // ---- origin marker (glowing core + ring sprite) ----\n    const oMat=new T.SpriteMaterial({map:this._discTex('rgba(220,255,235,1)','rgba(124,255,178,0)'),transparent:true,depthWrite:false,blending:T.AdditiveBlending});\n    const oSprite=new T.Sprite(oMat); oSprite.position.copy(O.clone().multiplyScalar(1.01)); oSprite.scale.setScalar(0.11); root.add(oSprite);\n    const ringMat=new T.SpriteMaterial({map:this._ringTex(),transparent:true,depthWrite:false,blending:T.AdditiveBlending,opacity:0.9});\n    const ring=new T.Sprite(ringMat); ring.position.copy(oSprite.position); root.add(ring);\n\n    // hide loader\n    if(this.load.current) this.load.current.style.display='none';\n\n    // ---- interaction ----\n    let rotY=0.05, rotX=0.60, tRotY=rotY, tRotX=rotX, velY=0;\n    let dragging=false, lx=0, ly=0, lastMove=0, autoSpin=false;\n    setTimeout(()=>{ if(!dragging) autoSpin=true; }, 6000);\n    const el=renderer.domElement;\n    const down=(e)=>{dragging=true;autoSpin=false;holder.style.cursor='grabbing';const t=e.touches?e.touches[0]:e;lx=t.clientX;ly=t.clientY;velY=0;};\n    const move=(e)=>{\n      const t=e.touches?e.touches[0]:e;\n      if(dragging){\n        const dx=t.clientX-lx, dy=t.clientY-ly; lx=t.clientX; ly=t.clientY;\n        tRotY+=dx*0.006; tRotX+=dy*0.006; velY=dx*0.006;\n        tRotX=Math.max(-1.1,Math.min(1.1,tRotX));\n      }\n      this._hover(t,renderer,camera,root,D,R);\n    };\n    const up=()=>{dragging=false;holder.style.cursor='grab';setTimeout(()=>{autoSpin=true;},2600);};\n    el.addEventListener('mousedown',down); window.addEventListener('mousemove',move); window.addEventListener('mouseup',up);\n    el.addEventListener('touchstart',down,{passive:true}); el.addEventListener('touchmove',move,{passive:true}); el.addEventListener('touchend',up);\n    el.addEventListener('wheel',(e)=>{e.preventDefault();camDist=Math.max(1.7,Math.min(5,camDist+e.deltaY*0.0016));},{passive:false});\n\n    this._onResize=()=>{W=holder.clientWidth;H=holder.clientHeight;renderer.setSize(W,H);camera.aspect=W/H;camera.updateProjectionMatrix();};\n    window.addEventListener('resize',this._onResize);\n\n    // ---- raycaster store for hover ----\n    this._ray={raycaster:new T.Raycaster(),mouse:new T.Vector2(),hasHover:false};\n    this._ray.raycaster.params.Points.threshold=0.03;\n\n    let t0=performance.now(), revealT=0;\n    const animate=()=>{\n      this._raf=requestAnimationFrame(animate);\n      const now=performance.now(), dt=Math.min(0.05,(now-t0)/1000); t0=now;\n      revealT+=dt*1000;\n      if(autoSpin && !dragging){ tRotY-=0.0011; }\n      else if(!dragging){ tRotY+=velY; velY*=0.95; }\n      rotY+=(tRotY-rotY)*0.12; rotX+=(tRotX-rotX)*0.12;\n      root.rotation.y=rotY; root.rotation.x=rotX;\n      camera.position.z+=(camDist-camera.position.z)*0.1;\n\n      // reveal arcs progressively then keep faint glow\n      arcLines.forEach((l)=>{\n        const target=0.42;\n        if(revealT>l._delay){ l.material.opacity+=(target-l.material.opacity)*0.06; }\n      });\n      // pulses travel along curves\n      const pa=pulses.geometry.attributes.position.array;\n      const ramp=Math.min(1,revealT/2600);\n      for(let i=0;i<pulseCurves.length;i++){\n        let tt=((now/1000)*0.16*pulseSpeed[i]+pulseOff[i])%1;\n        const pt=pulseCurves[i].getPoint(tt);\n        pa[i*3]=pt.x; pa[i*3+1]=pt.y; pa[i*3+2]=pt.z;\n      }\n      pulses.geometry.attributes.position.needsUpdate=true;\n      pulses.material.opacity=0.85*ramp;\n      // origin ring pulse\n      const ps=1+0.4*Math.sin(now*0.004);\n      ring.scale.setScalar(0.12*ps); ring.material.opacity=0.85*(1.4-ps);\n      oSprite.scale.setScalar(0.10+0.012*Math.sin(now*0.006));\n\n      renderer.render(scene,camera);\n    };\n    animate();\n  }\n\n  _ringTex(){\n    const c=document.createElement('canvas');c.width=c.height=128;const x=c.getContext('2d');\n    x.strokeStyle='rgba(140,255,190,1)';x.lineWidth=5;x.beginPath();x.arc(64,64,52,0,7);x.stroke();\n    const t=new window.THREE.Texture(c);t.needsUpdate=true;return t;\n  }\n\n  _hover(t, renderer, camera, root, D, R){\n    const ray=this._ray; if(!ray) return;\n    const T=window.THREE; const rect=renderer.domElement.getBoundingClientRect();\n    ray.mouse.x=((t.clientX-rect.left)/rect.width)*2-1;\n    ray.mouse.y=-((t.clientY-rect.top)/rect.height)*2+1;\n    ray.raycaster.setFromCamera(ray.mouse,camera);\n    // build / cache marker world positions\n    if(!this._mWorld){\n      this._mWorld=D.points.map(p=>this._v3(p[1],p[2],R*1.004));\n    }\n    let best=-1,bd=0.045;\n    const m=new T.Matrix4().copy(root.matrixWorld);\n    for(let i=0;i<this._mWorld.length;i++){\n      const wp=this._mWorld[i].clone().applyMatrix4(m);\n      // skip if on far side (behind globe relative to camera)\n      const toCam=camera.position.clone().sub(wp).normalize();\n      const nrm=wp.clone().normalize();\n      if(nrm.dot(toCam)<0.02) continue;\n      const d=ray.raycaster.ray.distanceToPoint(wp);\n      if(d<bd){bd=d;best=i;}\n    }\n    const tip=this.tip.current; if(!tip) return;\n    if(best>=0){\n      const p=D.points[best];\n      tip.style.opacity='1';\n      tip.style.left=t.clientX+'px'; tip.style.top=t.clientY+'px';\n      const yr=p[5]&&p[4]?`'25: ${p[4]} · '26: ${p[5]}`:p[4]?`2025`:`2026`;\n      tip.innerHTML=`<span style=\"color:#aef7cd\">${p[0].trim()}<\u002Fspan> &nbsp;·&nbsp; ${p[3]} shipment${p[3]>1?'s':''}`;\n    } else { tip.style.opacity='0'; }\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
